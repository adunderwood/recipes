<!DOCTYPE html>
<html lang="en">
{{PAGE_HEAD}}
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {{HOME_NAV}}

    <main id="main-content" class="container" role="main">
        <section class="home-hero" aria-labelledby="home-title">
            <div class="hero-copy">
                {{HOME_INTRO}}
            </div>
            <aside class="hero-aside" aria-label="Browse recipes by category">
                <p class="filters-kicker">Browse by category</p>
                <label for="mobile-category-filter" class="sr-only">Filter recipes by category</label>
                <select id="mobile-category-filter" class="category-select" aria-label="Filter recipes by category">
                    <option value="all">All Recipes ({{RECIPE_COUNT}})</option>
                    {{CATEGORY_FILTER_OPTIONS}}
                </select>
                <div class="category-filters hero-category-filters" role="group" aria-label="Filter recipes by category">
                    <button class="filter-btn active" data-category="all" aria-pressed="true">All Recipes ({{RECIPE_COUNT}})</button>
                    {{CATEGORY_FILTERS}}
                </div>
            </aside>
        </section>

        <section class="browse-panel">
            <div class="filters" role="search" aria-label="Recipe search and filters">
                <div class="filters-header">
                    <div>
                        <h3>Find a Recipe</h3>
                    </div>
                    <p class="filters-summary">Use commas for ingredient matchups like <span>lemon, garlic</span>.</p>
                </div>
                <label for="search" class="sr-only">Search recipes by name, description, or ingredients</label>
                <input type="text" id="search" placeholder="Search recipes, ingredients, or notes..." class="search-input" aria-label="Search recipes by name, description, or ingredients. Use commas to search for multiple ingredients.">
            </div>
        </section>

        <div class="recipe-grid" id="recipe-grid" role="list" aria-label="Recipe cards">
            {{RECIPE_CARDS}}
        </div>

        <div id="no-results" class="no-results" style="display: none;">
            <p>No recipes found matching your criteria.</p>
        </div>
    </main>

    {{PAGE_SCRIPTS}}
</body>
</html>
